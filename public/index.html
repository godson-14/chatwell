<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat App with Voice Notes</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="overlay" id="loginOverlay">
    <div class="login-card">
      <h1>Welcome</h1>
      <div class="auth-switch">
        <button id="showLoginBtn" type="button" class="auth-tab active">Login</button>
        <button id="showRegisterBtn" type="button" class="auth-tab">Register</button>
      </div>
      <form id="loginForm" class="auth-form">
        <input id="usernameInput" placeholder="Username" autocomplete="off" />
        <input id="passwordInput" type="password" placeholder="Password" autocomplete="new-password" />
        <button type="submit">Login</button>
      </form>
      <form id="registerForm" class="auth-form hidden">
        <input id="registerUsernameInput" placeholder="Username" autocomplete="off" />
        <input id="registerPasswordInput" type="password" placeholder="Password" autocomplete="new-password" />
        <input id="registerConfirmInput" type="password" placeholder="Confirm password" autocomplete="new-password" />
        <button type="submit">Register</button>
      </form>
      <div id="loginError" class="error"></div>
    </div>
  </div>

  <main class="app hidden" id="chatApp">
    <section class="sidebar" id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-header">
          <h2>Rooms</h2>
          <button id="mobileToggle" class="tool-button" type="button">☰</button>
        </div>
        <input id="searchInput" class="search-input" placeholder="Search messages" autocomplete="off" />
        <div id="roomsList" class="rooms-list"></div>
        <form id="createRoomForm" class="create-room-form">
          <input id="newRoomInput" placeholder="New room name" autocomplete="off" />
          <button type="submit">Create</button>
        </form>
        <div id="createRoomError" class="error"></div>
      </div>

      <div class="sidebar-section">
        <h2>Notifications</h2>
        <div id="notificationsList" class="notifications-list"></div>
      </div>

      <div class="sidebar-section">
        <h2>Invite</h2>
        <button id="logoutButton" class="voice-button">Logout</button>
        <button id="inviteButton" class="voice-button">Invite to private room</button>
        <button id="groupInviteButton" class="voice-button">Invite current room</button>
      </div>

      <div class="sidebar-section">
        <h2>Room Admin</h2>
        <button id="clearRoomButton" class="voice-button secondary">Clear current room</button>
        <button id="lockRoomButton" class="voice-button secondary">Lock room</button>
        <button id="muteUserButton" class="voice-button secondary">Mute user</button>
        <button id="banUserButton" class="voice-button secondary">Ban user</button>
      </div>

      <div class="sidebar-section">
        <h2>Community</h2>
        <button id="editProfileButton" class="voice-button secondary" type="button">Edit profile</button>
        <button id="createPollButton" class="voice-button secondary" type="button">Create poll</button>
        <button id="assistantButton" class="voice-button secondary" type="button">Ask assistant</button>
        <div id="profileCard" class="profile-card"></div>
        <div id="pinnedMessagesList" class="pinned-list"></div>
      </div>

      <div class="sidebar-section">
        <h2>Room Members</h2>
        <p class="section-note">These are users in your current room.</p>
        <div id="usersList" class="users-list"></div>
        <div class="select-row">
          <label for="recipientSelect">Send to</label>
          <select id="recipientSelect">
            <option value="All">All</option>
          </select>
        </div>
      </div>

      <div class="info-box" id="statusBox">Connecting...</div>
    </section>

    <section class="chat-panel">
      <header class="chat-header">
        <h2>Chat <span id="currentRoomName">(Lobby)</span></h2>
        <div class="header-tags">
          <span class="pill">Rooms</span>
          <span class="pill">Polls</span>
          <span class="pill">Assistant</span>
        </div>
      </header>
      <div id="messages" class="messages"></div>

      <form id="messageForm" class="message-form">
        <input id="messageInput" placeholder="Type a message" autocomplete="off" />
        <button id="sendButton" type="submit">Send</button>
      </form>
      <div class="composer-tools">
        <button id="emojiButton" type="button" class="tool-button">😀</button>
        <label class="tool-button" for="fileInput">📎</label>
        <input id="fileInput" type="file" hidden />
        <button id="soundToggle" type="button" class="tool-button" title="Mute sounds">🔊</button>
        <button id="voiceCallButton" type="button" class="tool-button" title="Start voice call">📞</button>
        <button id="videoCallButton" type="button" class="tool-button" title="Start video call">📹</button>
        <button id="themeToggle" type="button" class="tool-button">🌙</button>
      </div>
      <div id="emojiPicker" class="emoji-picker hidden">
        <button type="button" data-emoji="👍">👍</button>
        <button type="button" data-emoji="❤️">❤️</button>
        <button type="button" data-emoji="😂">😂</button>
        <button type="button" data-emoji="🔥">🔥</button>
        <button type="button" data-emoji="🎉">🎉</button>
      </div>
      <div id="typingIndicator" class="typing-indicator"></div>
      <button id="voiceButton" class="voice-button">Record voice note</button>
      <div id="recordingIndicator" class="recording hidden">Recording... press again to stop</div>
    </section>
  </main>

  <div id="callOverlay" class="call-overlay hidden">
    <div class="call-panel">
      <div id="callStatus" class="call-status">Call</div>
      <div class="call-videos">
        <video id="localVideo" autoplay playsinline muted></video>
        <video id="remoteVideo" autoplay playsinline></video>
      </div>
      <div class="call-actions">
        <button id="acceptCallButton" type="button">Answer</button>
        <button id="declineCallButton" type="button">Decline</button>
        <button id="hangupCallButton" type="button">Hang up</button>
      </div>
    </div>
  </div>

  <script src="https://chatwell-rg2y.onrender.com/socket.io/socket.io.js"></script>
  <script>
    window.SOCKET_SERVER_URL = 'https://chatwell-rg2y.onrender.com';
  </script>
  <script src="client.js"></script>
</body>
</html>
